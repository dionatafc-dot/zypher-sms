<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#121212" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%227%22%20fill%3D%22%233b82f6%22/%3E%3Cpath%20d%3D%22M8%209h16l-8%209v4h4v2H12v-2h4v-4z%22%20fill%3D%22%23ffffff%22/%3E%3C/svg%3E" />
<title>SMS · Team</title>
<link rel="stylesheet" href="/styles.css" />
<style>
.choice .c-main{min-width:0}
.choice .c-sub{display:block;color:var(--muted);font-size:14px;font-weight:400;margin-top:3px}
.chip.no{color:var(--danger);border-color:var(--danger-border);background:var(--danger-soft)}
.qrow{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:10px}
.qhead{display:flex;align-items:center;gap:14px;justify-content:space-between}
.refresh{appearance:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;height:40px;padding:0 16px;border-radius:12px;border:1px solid var(--line-soft);background:var(--card-hi);color:var(--ink);flex:0 0 auto;margin-left:auto}
.qmsg{margin-top:12px;font-size:15px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;white-space:pre-wrap;line-height:1.45}
.sendbar{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top,var(--bg) 72%,rgba(0,0,0,0));padding:16px 20px calc(18px + env(safe-area-inset-bottom));z-index:40}
.sendbar .inner{max-width:720px;margin:0 auto}
.sel-count{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px}
.btn.block{width:100%}
.hidden{display:none!important}
.wrap{padding-bottom:130px}
#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(10px);background:var(--card-hi);color:var(--ink);border:1px solid var(--line-soft);border-radius:999px;padding:10px 18px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:60;max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">

  <section id="screen-main">
    <div class="top">
      <div>
        <h1>Send SMS</h1>
        <div class="sub">Zypher Lounge · SMS</div>
      </div>
      <button class="refresh" id="btn-refresh">↻ Refresh</button>
    </div>
    <div id="queue-body"><div class="loading">Loading…</div></div>
    <div class="eyebrow" style="margin-top:26px">Settings</div>
    <div class="choices">
      <button class="choice" id="btn-webhook"><span class="c-main">🔔 Enable automatic confirmation<span class="c-sub">The team's YES/NO replies will update Notion automatically. Use once.</span></span><span class="arrow">›</span></button>
    </div>
  </section>

</div>

<div class="sendbar hidden" id="sendbar">
  <div class="inner">
    <div class="sel-count" id="sel-count"></div>
    <button class="btn primary block" id="btn-send">Send all</button>
  </div>
</div>

<div id="toast"></div>

<div class="overlay hidden" id="pin-overlay" style="display:none">
  <div class="modal">
    <h3>Panel access</h3>
    <p>Enter the PIN to continue.</p>
    <input id="pin-input" type="password" inputmode="numeric" placeholder="PIN" style="width:100%;height:50px;border:1px solid var(--line-soft);border-radius:12px;background:var(--bg);padding:0 16px;font-size:18px;color:var(--ink);font-family:inherit;margin-bottom:14px;text-align:center;letter-spacing:.2em" />
    <div id="pin-err" class="errbar hidden">Wrong PIN.</div>
    <button class="btn primary block" id="pin-ok">Enter</button>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const state = { pin: sessionStorage.getItem("sms_pin") || "", queue: [] };
function headers(){ return { "Content-Type":"application/json", "x-panel-pin": state.pin }; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),3200); }

function askPin(){ const o=$("#pin-overlay"); o.style.display="flex"; o.classList.remove("hidden"); setTimeout(()=>$("#pin-input").focus(),100); }
function hidePin(){ const o=$("#pin-overlay"); o.style.display="none"; o.classList.add("hidden"); }
$("#pin-ok").onclick = () => { const v=$("#pin-input").value.trim(); if(!v)return; state.pin=v; sessionStorage.setItem("sms_pin",v); $("#pin-err").classList.add("hidden"); hidePin(); loadQueue(); };
$("#pin-input").addEventListener("keydown",(e)=>{ if(e.key==="Enter")$("#pin-ok").click(); });

async function loadQueue(){
  $("#queue-body").innerHTML='<div class="loading">Loading…</div>';
  try{
    const r=await fetch("/api/sms/queue?t="+Date.now(),{headers:headers(),cache:"no-store"});
    if(r.status===401){ sessionStorage.removeItem("sms_pin"); state.pin=""; askPin(); return; }
    if(!r.ok) throw new Error((await r.json()).error||r.status);
    const d=await r.json(); state.queue=d.queue||[]; renderQueue();
  }catch(e){ $("#queue-body").innerHTML='<div class="errbar">Error loading: '+e.message+'</div>'; }
}
function renderQueue(){
  const q=state.queue;
  if(!q.length){ $("#queue-body").innerHTML='<div class="empty"><div class="big">Nothing to send</div>In Notion, write the <b>Mensagem</b> and tick <b>Enviar</b> for each person. They show up here.</div>'; updateBar(); return; }
  let html='<div class="eyebrow">Ready to send ('+q.length+')</div>';
  for(const it of q){
    const noPhone=!it.phone;
    const chips=[it.funcao,it.evento].filter(Boolean).map(c=>`<span class="chip">${esc(c)}</span>`).join("")+(noPhone?'<span class="chip no">no phone</span>':"");
    html+=`<div class="qrow" data-id="${esc(it.escalaId)}"><div class="qhead"><div class="row-text"><div class="row-name">${esc(it.nome)||"(no name)"}</div><div class="row-meta">${chips}</div></div><button class="yes send-one" ${noPhone?"disabled":""}>Send</button></div><div class="qmsg">${esc(it.mensagem)}</div></div>`;
  }
  $("#queue-body").innerHTML=html;
  document.querySelectorAll("#queue-body .qrow").forEach(row=>{ const id=row.dataset.id; const btn=row.querySelector(".send-one"); if(btn && !btn.disabled) btn.onclick=()=>sendOne(id); });
  updateBar();
}
function updateBar(){
  const n=state.queue.filter(x=>x.phone).length;
  $("#sel-count").textContent=n+(n===1?" message ready":" messages ready");
  $("#btn-send").textContent=n?"Send all ("+n+")":"Nothing to send";
  $("#btn-send").disabled=n===0; $("#btn-send").style.opacity=n===0?".5":"1";
  $("#sendbar").classList.toggle("hidden", state.queue.length===0);
}
async function sendItems(items){
  const r=await fetch("/api/sms/send-queue",{method:"POST",headers:headers(),body:JSON.stringify({items})});
  if(r.status===401){ askPin(); throw new Error("PIN"); }
  const res=await r.json(); if(!r.ok) throw new Error(res.error||r.status);
  return res;
}
async function sendOne(id){
  const it=state.queue.find(x=>x.escalaId===id); if(!it) return;
  const row=document.querySelector('.qrow[data-id="'+(window.CSS&&CSS.escape?CSS.escape(id):id)+'"]');
  const btn=row&&row.querySelector(".send-one");
  if(btn){ btn.textContent="…"; btn.disabled=true; }
  try{
    const res=await sendItems([{escalaId:it.escalaId,phone:it.phone,message:it.mensagem,nome:it.nome}]);
    const r0=(res.resultados||[])[0];
    if(r0&&r0.ok){ state.queue=state.queue.filter(x=>x.escalaId!==id); renderQueue(); toast("✓ Sent to "+(it.nome||"")); }
    else { toast("✕ "+((r0&&r0.error)||"failed")); if(btn){ btn.textContent="Send"; btn.disabled=false; } }
  }catch(e){ if(e.message!=="PIN") toast("✕ "+e.message); if(btn){ btn.textContent="Send"; btn.disabled=false; } }
}
$("#btn-refresh").onclick=()=>{ const b=$("#btn-refresh"); b.textContent="…"; b.disabled=true; loadQueue().finally(()=>{ b.textContent="↻ Refresh"; b.disabled=false; }); };
$("#btn-send").onclick=async()=>{
  const items=state.queue.filter(x=>x.phone).map(x=>({escalaId:x.escalaId,phone:x.phone,message:x.mensagem,nome:x.nome}));
  if(!items.length) return;
  if(!confirm("Send "+items.length+" message(s)?")) return;
  $("#btn-send").textContent="Sending…"; $("#btn-send").disabled=true;
  try{
    const res=await sendItems(items);
    const okIds=new Set((res.resultados||[]).filter(x=>x.ok).map(x=>x.escalaId));
    state.queue=state.queue.filter(x=>!okIds.has(x.escalaId));
    renderQueue();
    const fail=(res.resultados||[]).filter(x=>!x.ok);
    toast("✓ "+res.enviados+" of "+res.total+" sent"+(fail.length?" · "+fail.length+" failed":""));
  }catch(e){ if(e.message!=="PIN"){ toast("✕ "+e.message); updateBar(); } }
};
$("#btn-webhook").onclick=async()=>{
  if(!state.pin){ askPin(); return; }
  if(!confirm("Enable automatic attendance confirmation?\n\nThe team's YES/NO replies will update Notion automatically. You only need to do this once.")) return;
  const btn=$("#btn-webhook"), sub=btn.querySelector(".c-sub"), old=sub.textContent;
  sub.textContent="Enabling…"; btn.disabled=true; btn.style.opacity=".6";
  try{
    const r=await fetch("/api/sms/register-webhook?pin="+encodeURIComponent(state.pin));
    if(r.status===401){ alert("Wrong PIN. Please sign in again."); sessionStorage.removeItem("sms_pin"); state.pin=""; sub.textContent=old; btn.disabled=false; btn.style.opacity="1"; askPin(); return; }
    const res=await r.json();
    if(r.ok && res.ok){ alert("✓ Automatic confirmation enabled!\n\nWhen someone replies YES or NO, Notion updates on its own."); sub.textContent="✓ Enabled"; }
    else { alert("Didn't work: "+(res.resposta_servidor||res.error||"unknown error")); sub.textContent=old; btn.disabled=false; btn.style.opacity="1"; }
  }catch(e){ alert("Error: "+e.message); sub.textContent=old; btn.disabled=false; btn.style.opacity="1"; }
};
if(!state.pin) askPin(); else loadQueue();
</script>
</body>
</html>
